version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: oneconnect_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: oneconnect_db
      POSTGRES_USER: oneconnect
      POSTGRES_PASSWORD: oneconnect_secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oneconnect -d oneconnect_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
